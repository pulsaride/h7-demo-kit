name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# h7-monitor is checked out via a fine-grained PAT scoped to
# pulsaride/h7-monitor (Contents: Read).
# Secret name: H7_MONITOR_READ (already configured in repo settings)
permissions:
  contents: read

jobs:
  # ── Pure-Python unit/integration suite ────────────────────────────────────
  # No kernel, no binaries, no network. Runs on every push and PR.
  test:
    name: make test (pytest, no eBPF)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test deps
        run: pip install --quiet -r requirements-test.txt

      - name: Seed offline baseline (BTF unavailable in CI)
        run: make seed-offline-baseline

      - name: make test
        run: make test

  # ── Full e2e pipeline (sim → monitor → verify → drift → audit) ────────────
  e2e-full:
    name: make e2e-full (no eBPF)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── Checkout demo-kit (this repo) ──────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          path: h7-demo-kit

      # ── Extract h7-monitor backend from the public GHCR image ──────────────
      # No private repo checkout or PAT needed — the image is public.
      # docker cp extracts /app/backend and /app/fixtures so that
      # H7_MONITOR_BACKEND_DIR and e2e-full.sh work identically to before.
      - name: Pull public h7-monitor image and extract backend
        run: |
          docker pull ghcr.io/pulsaride/h7-monitor:latest
          docker create --name h7-extract ghcr.io/pulsaride/h7-monitor:latest
          mkdir -p h7-monitor
          docker cp h7-extract:/app/backend  h7-monitor/backend
          docker cp h7-extract:/app/fixtures h7-monitor/fixtures
          docker rm h7-extract

      # ── Python ─────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: h7-monitor/backend/requirements.txt

      - name: Install backend deps
        run: |
          pip install --quiet \
            -r h7-monitor/backend/requirements.txt \
            httpx

      # ── make e2e-full ──────────────────────────────────────────────────────
      - name: make e2e-full
        working-directory: h7-demo-kit
        env:
          H7_MONITOR_BACKEND_DIR: ${{ github.workspace }}/h7-monitor/backend
          H7_ATTEST_TOKEN: h7-ci-test-token
          H7_E2E_PORT: "18007"
        run: make e2e-full

      # ── make verify-gate-hardening ─────────────────────────────────────────
      - name: make verify-gate-hardening
        working-directory: h7-demo-kit
        env:
          H7_MONITOR_BACKEND_DIR: ${{ github.workspace }}/h7-monitor/backend
        run: make verify-gate-hardening

      # ── Persist artifacts ──────────────────────────────────────────────────
      - name: Upload audit-package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-package-${{ github.sha }}
          path: h7-demo-kit/run/audit-package/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload drift-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.sha }}
          path: h7-demo-kit/run/reports/
          if-no-files-found: warn
          retention-days: 30
